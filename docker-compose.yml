version: '3.8'

services:
  # ==========================================
  # BACK-END PRINCIPAL (NODE.JS)
  # ==========================================
  api:
    build:
      context: ./MD_back_end/MindDeskRH
    container_name: minha-api
    ports:
      - "3000:3000"
    env_file:
      - ./MD_back_end/MindDeskRH/.env
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ==========================================
  # MICROSSERVIÇOS (PYTHON / UVICORN)
  # ==========================================
  minddesk-documentos:
    build:
      context: ./MD_MS_atestado
    container_name: minddesk_docs
    ports:
      - "8060:8000"
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./MD_MS_atestado/app:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  ai-microservice:
    build:
      context: ./MD_MS_pdf_vectorize/MS_pdf_vectorize
    container_name: ai-microservice
    ports:
      - "8005:8000"
    env_file:
      - .env
    volumes:
      - ./MD_MS_pdf_vectorize/MS_pdf_vectorize:/app
    environment:
      - SUPABASE_URL=sua_url_aqui
      - SUPABASE_KEY=sua_key_aqui
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  pa-microservice:
    build:
      context: ./MD_MS_ppls_nltcs/MD_MS_ppls_nltcs
    container_name: people_analytics_api
    ports:
      - "8090:8000"
    env_file:
      - .env
    environment:
      - TZ=America/Sao_Paulo
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: always

  minddesk-chat_python_tools:
    build:
      context: ./MD_MS_python_consulting_tools/MD_MS_pyth_csltn_tls
    container_name: minddesk_tools
    ports:
      - "8040:8000"
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./MD_MS_python_consulting_tools/MD_MS_pyth_csltn_tls/app:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  minddesk-ia-rag:
    build:
      context: ./MD_MS_RAG/rag_micro_service
    container_name: minddesk_worker
    ports:
      - "8000:8000"
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./MD_MS_RAG/rag_micro_service/app:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  minddesk-orquestrador:
    build:
      context: ./MD_MS_rqstrdr
    container_name: minddesk_router
    ports:
      - "8050:8000"
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./MD_MS_rqstrdr/app:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload