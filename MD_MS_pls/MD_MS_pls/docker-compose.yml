version: '3.8'

services:
  minddesk-pulse:
    build: .
    container_name: minddesk_pulse
    ports:
      - "8070:8000" # Rodará na porta 8070 da sua máquina
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./app:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload